[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=config
    --cov=pipeline
    --cov=models
    --cov=api
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -v
markers =
    integration: 통합 테스트 (CI에서는 -m "not integration"으로 제외)
    slow: 느린 테스트 (실제 모델 로딩 필요)
