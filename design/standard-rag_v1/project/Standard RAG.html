<!-- iLive component bundle (required by design system) -->
<script src="_ds/ilive-design-system-a582186a-eebc-4437-ace5-09649a4fd90e/_ds_bundle.js"></script>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: var(--il-bg-base); }
  #root { height: 100%; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    user-select: none;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--il-overlay); border-radius: 6px; border: 2px solid var(--il-surface); }
  ::-webkit-scrollbar-thumb:hover { background: #4a4e57; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Range slider thumb */
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; border: 3px solid var(--il-blue);
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.4);
    margin-top: -1px;
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 3px solid var(--il-blue); cursor: pointer;
  }
  input[type=range] { background: transparent; }

  select option { background: var(--il-surface-el); color: var(--il-text-primary); }

  @keyframes srPulse { 0% { transform: scale(1); opacity: .6; } 100% { transform: scale(2.6); opacity: 0; } }
  @keyframes srSpin { to { transform: rotate(360deg); } }
  @keyframes srBlink { 50% { opacity: 0; } }
</style>
</head>
<body class="il">
  <div id="root"></div>

  <!-- Tweaks shell -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <!-- App modules -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="chatbot.jsx"></script>
  <script type="text/babel" src="ragmanage.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#0F1013"/>
      <rect x="30" y="30" width="40" height="40" rx="9" fill="#214290"/>
      <path d="M40 50 h20 M40 44 h20 M40 56 h12" stroke="#2993D1" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </template>
</body>
</html>
